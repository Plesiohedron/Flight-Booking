services:
  flight-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flights"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - flight-db-data:/var/lib/postgresql/data

  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookings"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - booking-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  flight-service:
    build:
      context: ./flight-service
    environment:
      DATABASE_URL: "postgres://postgres:postgres@flight-db:5432/flights?sslmode=disable"
      GRPC_PORT: "50051"
      REDIS_URL: "redis://redis:6379"
      API_KEY: "secret-key"
    ports:
      - "50051:50051"
    depends_on:
      flight-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  booking-service:
    build:
      context: ./booking-service
    environment:
      DATABASE_URL: "postgres://postgres:postgres@booking-db:5432/bookings?sslmode=disable"
      FLIGHT_SERVICE_URL: "flight-service:50051"
      API_KEY: "secret-key"
    ports:
      - "8000:8000"
    depends_on:
      booking-db:
        condition: service_healthy
      flight-service:
        condition: service_started

volumes:
  flight-db-data:
  booking-db-data:
